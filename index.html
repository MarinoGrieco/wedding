<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1014">
  <title>Il Nostro Matrimonio 💍</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Envelope Overlay -->
  <div id="envelope-overlay">
    <div class="envelope-scene">
      <p class="envelope-hint">Tocca per aprire</p>
      <div class="envelope" id="envelope">
        <div class="envelope-back"></div>
        <div class="envelope-letter">
          <div class="letter-content">
            <div class="letter-ornament">✦</div>
            <p class="letter-text">Siete invitati al nostro matrimonio</p>
            <div class="letter-ornament">✦</div>
          </div>
        </div>
        <div class="envelope-front">
          <div class="envelope-seal"></div>
        </div>
        <div class="envelope-flap"></div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app-hidden">
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Caricamento...</p>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <!-- QR Code library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <!-- App -->
  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
